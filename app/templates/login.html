<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему | ЕКЦ График</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        /* ===== LOGIN PAGE ===== */

        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background:
                radial-gradient(ellipse at 20% 50%, color-mix(in srgb, var(--apple-blue) 6%, transparent) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, color-mix(in srgb, var(--apple-purple) 4%, transparent) 0%, transparent 50%),
                var(--bg);
            position: relative;
            overflow: hidden;
        }

        .login-page::before {
            content: '';
            position: absolute;
            inset: -50%;
            background:
                radial-gradient(circle at 30% 70%, rgba(255,255,255,0.4) 0%, transparent 60%),
                radial-gradient(circle at 70% 30%, rgba(255,255,255,0.3) 0%, transparent 60%);
            animation: loginFloat 20s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes loginFloat {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(1%, -1%); }
            66% { transform: translate(-1%, 0.5%); }
        }

        .login-wrap {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: loginFadeUp 500ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
        }

        @keyframes loginFadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo treatment */
        .login-logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-logo__icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--apple-blue), var(--apple-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            box-shadow: 0 8px 24px color-mix(in srgb, var(--apple-blue) 25%, transparent);
            animation: logoGlow 4s ease-in-out infinite;
        }

        @keyframes logoGlow {
            0%, 100% { box-shadow: 0 8px 24px color-mix(in srgb, var(--apple-blue) 25%, transparent); }
            50% { box-shadow: 0 8px 32px color-mix(in srgb, var(--apple-blue) 35%, transparent); }
        }

        .login-logo h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text-primary);
            margin: 0;
            line-height: 1.2;
        }

        .login-logo p {
            font-size: 0.9rem;
            color: var(--text-tertiary);
            margin-top: 6px;
            font-weight: 400;
        }

        /* Glass card */
        .login-card {
            padding: 36px 32px;
            background: color-mix(in srgb, var(--bg-surface) 85%, rgba(255,255,255,0));
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid color-mix(in srgb, var(--border-light) 80%, rgba(255,255,255,0.6));
            border-radius: var(--radius-xl);
            box-shadow:
                0 4px 24px rgba(0, 0, 0, 0.04),
                0 1px 2px rgba(0, 0, 0, 0.02);
            transition: box-shadow 300ms ease, transform 300ms ease;
        }

        .login-card:hover {
            box-shadow:
                0 8px 40px rgba(0, 0, 0, 0.06),
                0 2px 8px rgba(0, 0, 0, 0.03);
        }

        .login-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-header h2 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            margin: 0;
        }

        .login-header p {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Enhanced input focus states */
        .login-card .input {
            padding: 13px 16px;
            font-size: 15px;
            transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-card .input:hover {
            border-color: var(--gray-300);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.03);
        }

        .login-card .input:focus {
            box-shadow: 0 0 0 4px color-mix(in srgb, var(--apple-blue) 15%, transparent);
            border-color: var(--apple-blue);
            transform: translateY(-0.5px);
        }

        /* Submit button */
        .login-card .btn--primary {
            padding: 14px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: var(--radius-md);
            transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-card .btn--primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px color-mix(in srgb, var(--apple-blue) 30%, transparent);
        }

        .login-card .btn--primary:active {
            transform: translateY(0) scale(0.98);
        }

        /* Submit loading state */
        .login-card .btn--primary.is-loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .login-card .btn--primary.is-loading .btn__text {
            opacity: 0;
        }

        .login-card .btn__spinner {
            display: none;
            position: absolute;
        }

        .login-card .btn--primary.is-loading .btn__spinner {
            display: block;
        }

        .login-card .btn--primary {
            position: relative;
        }

        .login-footer {
            text-align: center;
            color: var(--text-tertiary);
            font-size: 0.8rem;
            margin-top: 20px;
            letter-spacing: 0.01em;
        }

        /* Error alert animation */
        .login-card .alert {
            animation: loginShake 400ms ease both;
            margin-bottom: 18px;
        }

        @keyframes loginShake {
            0%, 100% { transform: translateX(0); }
            15% { transform: translateX(-4px); }
            30% { transform: translateX(4px); }
            45% { transform: translateX(-2px); }
            60% { transform: translateX(2px); }
        }

        /* Mobile */
        @media (max-width: 480px) {
            .login-page {
                padding: 16px;
                align-items: flex-start;
                padding-top: 10vh;
            }
            .login-logo__icon {
                width: 48px;
                height: 48px;
                border-radius: 14px;
                font-size: 0.95rem;
            }
            .login-logo h1 {
                font-size: 1.5rem;
            }
            .login-card {
                padding: 28px 24px;
                border-radius: var(--radius-lg);
            }
        }
    </style>
</head>
<body style="margin: 0;">
    <div class="login-page">
        <div class="login-wrap">
            <!-- Logo -->
            <div class="login-logo">
                <div class="login-logo__icon" aria-hidden="true">ЕК</div>
                <h1>ЕКЦ График</h1>
                <p>Планировщик смен</p>
            </div>

            <!-- Login Card -->
            <div class="card login-card">
                <div class="login-header">
                    <h2>Вход в систему</h2>
                    <p>Выберите сотрудника и введите пароль</p>
                </div>

                {% if error %}
                <div class="alert alert-error" role="alert">
                    <span class="alert-icon" aria-hidden="true">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                    </span>
                    <span>{{ error }}</span>
                </div>
                {% endif %}

                <form method="post" action="/login" class="login-form" id="loginForm" novalidate>
                    <div class="form-group">
                        <label for="employee_name" class="form-label">Сотрудник</label>
                        <select name="employee_name" id="employee_name" required class="input w-full">
                            <option value="" disabled selected>Выберите сотрудника</option>
                            {% for employee in employees %}
                            <option value="{{ employee.name }}">{{ employee.name }}</option>
                            {% endfor %}
                            <option value="admin">Администратор</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">
                            Пароль
                            <span class="form-label--required"><span class="sr-only">обязательное поле</span></span>
                        </label>
                        <input
                            type="password"
                            name="password"
                            id="password"
                            required
                            class="input w-full"
                            placeholder="Введите пароль"
                            minlength="6"
                            autocomplete="current-password"
                            aria-describedby="password-hint"
                        >
                        <span id="password-hint" class="form-hint" style="display:none"></span>
                    </div>

                    <button type="submit" class="btn btn--primary btn--lg btn--block" id="loginBtn">
                        <span class="btn__text">Войти</span>
                        <span class="btn__spinner spinner spinner--sm" style="color: white;"></span>
                    </button>
                </form>
            </div>

            <!-- Footer -->
            <p class="login-footer">Система планирования смен ЕКЦ</p>
        </div>
    </div>

    <script>
        // Focus the select on load
        (function() {
            document.getElementById('employee_name').focus();
        })();

        // Form submit — loading state, then submit
        document.getElementById('loginForm').addEventListener('submit', function() {
            var btn = document.getElementById('loginBtn');
            btn.classList.add('is-loading');
            btn.disabled = true;
        });
    </script>
</body>
</html>
